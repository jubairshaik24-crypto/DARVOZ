<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>DARVOZ | Food</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f5f5f5;
}

header{
    background:#ff6b00;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    margin:0;
}

.search{
    width:90%;
    margin:30px auto;
}

.search input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,.1);
    font-size:16px;
}
.restaurants{
    width:100%;
    padding:20px 40px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.card{
display:flex;
align-items:center;
width:100%;
max-width:1200px;
padding:20px;
background:#fff;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin:10px auto;
}
.card img{
width:220px;
height:160px;
object-fit:cover;
border-radius:12px;
margin-right:25px;
}
.details{
flex:1;
}

.details h2{
font-size:32px;
margin-bottom:10px;
}

.details p{
font-size:18px;
line-height:1.6;
}

.rating,
.offer{
font-size:20px;
font-weight:bold;
}
.rating{

color:green;

font-weight:bold;

margin-top:8px;

}

.offer{

color:#ff6b00;

font-weight:600;

margin-top:10px;

}

</style>

</head>

<body>

<header>

<h1>DARVOZ FOOD</h1>

<a href="index.html" style="color:white;text-decoration:none;">Home</a>

</header>

<div class="search">

<input type="text" placeholder="Search Restaurants...">

</div>

<section class="restaurants">

<div class="card" onclick="location.href='restaurant.html'">

<img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?w=800">

<div class="details">

<h2>Indian Biryani</h2>

<p>Biryani • Indian • Chinese</p>

<div class="rating">⭐ 4.8</div>

<div class="offer">30% OFF</div>

</div>

</div>

<div class="card" onclick="location.href='restaurant.html'">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800">

<div class="details">

<h2>paro</h2>

<p>Burgers • Fries • Drinks</p>

<div class="rating">⭐ 4.7</div>

<div class="offer">FREE DELIVERY</div>

</div>

</div>

<div class="card" onclick="location.href='restaurant.html'">

<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800">

<div class="details">

<h2>Pizza Point</h2>

<p>Pizza • Pasta</p>

<div class="rating">⭐ 4.6</div>

<div class="offer">20% OFF</div>

</div>

</div>

<div class="card" onclick="location.href='restaurant.html'">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?w=800">

<div class="details">

<h2>BBQ Nation</h2>

<p>Grill • BBQ • Family Meals</p>

<div class="rating">⭐ 4.9</div>

<div class="offer">Buy 1 Get 1</div>

</div>

</div>

</section>

</body>
</html>
