<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DARVOZ | Delivery Registration</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6b00;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
max-width:700px;
margin:30px auto;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card h2{
margin-bottom:20px;
text-align:center;
}

input,
textarea,
select{

width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;

}

textarea{

height:90px;
resize:none;

}

button{

width:100%;
padding:15px;
background:#28a745;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#218838;

}

</style>

</head>

<body>

<header>

DARVOZ Delivery Registration

</header>

<div class="container">

<div class="card">

<h2>Become a Delivery Partner</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="tel"
id="mobile"
placeholder="Mobile Number">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Create Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<select id="vehicle">

<option value="">Select Vehicle</option>

<option>Bike</option>

<option>Scooter</option>



</select>

<input
type="text"
id="vehicleNumber"
placeholder="Vehicle Number">

<input
type="text"
id="license"
placeholder="Driving License Number">

<input
type="text"
id="aadhaar"
placeholder="Aadhaar Number">

<input
type="text"
id="city"
placeholder="City">

<textarea
id="address"
placeholder="Full Address"></textarea>

<button onclick="registerDeliveryPartner()">

Register Now

</button>

</div>

</div>
<script>

async function registerDeliveryPartner(){

const name=document.getElementById("name").value.trim();
const mobile=document.getElementById("mobile").value.trim();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;
const confirmPassword=document.getElementById("confirmPassword").value;
const vehicle=document.getElementById("vehicle").value;
const vehicleNumber=document.getElementById("vehicleNumber").value.trim();
const license=document.getElementById("license").value.trim();
const aadhaar=document.getElementById("aadhaar").value.trim();
const city=document.getElementById("city").value.trim();
const address=document.getElementById("address").value.trim();

// Validation

if(name==""){
alert("Enter Full Name");
return;
}

if(mobile.length!=10){
alert("Enter Valid Mobile Number");
return;
}

if(email==""){
alert("Enter Email");
return;
}

if(password.length<6){
alert("Password must be at least 6 characters");
return;
}

if(password!==confirmPassword){
alert("Passwords do not match");
return;
}

if(vehicle==""){
alert("Select Vehicle");
return;
}

if(vehicleNumber==""){
alert("Enter Vehicle Number");
return;
}

if(license==""){
alert("Enter Driving License Number");
return;
}

if(aadhaar.length!=12){
alert("Enter Valid Aadhaar Number");
return;
}

if(city==""){
alert("Enter City");
return;
}

if(address==""){
alert("Enter Address");
return;
}

// Send Data to Server

const response=await fetch(
"http://localhost:5000/delivery/register",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name,
mobile,
email,
password,
vehicle,
vehicle_number:vehicleNumber,
license,
aadhaar,
city,
address

})

}

);

const result=await response.json();

if(result.success){

alert("Registration Successful! Waiting for Admin Approval.");

window.location.href="delivery-login.html";

}else{

alert(result.message || "Registration Failed");

}

}
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("/service-worker.js")
      .then((registration) => {
        console.log("Service Worker Registered", registration);
      })
      .catch((error) => {
        console.log("Registration Failed", error);
      });
  });
}

</script>

</body>
</html>
