<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">

<title>DARVOZ | Delivery Wallet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{

background:#ff6b00;
color:white;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;

}

header h2{

font-size:26px;

}

.back{

background:white;
color:#ff6b00;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}

.container{

width:90%;
max-width:1100px;
margin:25px auto;

}

.balance{

background:linear-gradient(135deg,#ff6b00,#ff9a3c);
color:white;
padding:30px;
border-radius:18px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.15);

}

.balance h3{

font-size:22px;
margin-bottom:10px;

}

.balance h1{

font-size:48px;

}

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;

}

.card{

background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.card h3{

color:#666;
margin-bottom:10px;

}

.card h2{

color:#ff6b00;

}

.transactions{

margin-top:30px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.transactions h2{

margin-bottom:20px;
color:#ff6b00;

}

table{

width:100%;
border-collapse:collapse;

}

table th{

background:#ff6b00;
color:white;
padding:12px;

}

table td{

padding:12px;
text-align:center;
border-bottom:1px solid #eee;

}

.credit{

color:green;
font-weight:bold;

}

.withdraw{

margin-top:25px;
text-align:center;

}

.withdraw button{

background:#28a745;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;

}

</style>

</head>

<body>

<header>

<h2>💰 Delivery Wallet</h2>

<button
class="back"
onclick="window.location.href='delivery-dashboard.html'">

← Dashboard

</button>

</header>

<div class="container">

<div class="balance">

<h3>Available Balance</h3>

<h1>

₹<span id="balance">

0

</span>

</h1>

</div>

<div class="cards">

<div class="card">

<h3>Today's Earnings</h3>

<h2>

₹<span id="today">

0

</span>

</h2>

</div>

<div class="card">

<h3>This Week</h3>

<h2>

₹<span id="week">

0

</span>

</h2>

</div>

<div class="card">

<h3>This Month</h3>

<h2>

₹<span id="month">

0

</span>

</h2>

</div>

<div class="card">

<h3>Total Earnings</h3>

<h2>

₹<span id="total">

0

</span>

</h2>

</div>

</div>

<div class="transactions">

<h2>Recent Transactions</h2>

<table>

<thead>

<tr>

<th>Order</th>
<th>Amount</th>
<th>Date</th>

</tr>

</thead>

<tbody id="history">

<tr>

<td colspan="3">

Loading...

</td>

</tr>

</tbody>

</table>

<div class="withdraw">

<button onclick="withdrawMoney()">

💸 Withdraw Money

</button>

</div>

</div>

</div>
<script>

const rider = JSON.parse(localStorage.getItem("deliveryPartner"));

if (!rider) {
    window.location.href = "delivery-login.html";
}

// Load Wallet

async function loadWallet() {

    try {

        const response = await fetch(
            "http://localhost:5000/wallet/" + rider.id
        );

        const data = await response.json();

        document.getElementById("balance").innerHTML = data.balance || 0;
        document.getElementById("today").innerHTML = data.today || 0;
        document.getElementById("week").innerHTML = data.week || 0;
        document.getElementById("month").innerHTML = data.month || 0;
        document.getElementById("total").innerHTML = data.total || 0;

    } catch (err) {

        console.log(err);

    }

}


// Load Transaction History

async function loadHistory() {

    try {

        const response = await fetch(
            "http://localhost:5000/wallet/history/" + rider.id
        );

        const history = await response.json();

        let html = "";

        if (history.length === 0) {

            html = `
            <tr>
                <td colspan="3">No Transactions</td>
            </tr>
            `;

        } else {

            history.forEach(item => {

                html += `

                <tr>

                    <td>#${item.order_id}</td>

                    <td class="credit">

                        +₹${item.amount}

                    </td>

                    <td>

                        ${new Date(item.created_at).toLocaleDateString()}

                    </td>

                </tr>

                `;

            });

        }

        document.getElementById("history").innerHTML = html;

    } catch (err) {

        console.log(err);

    }

}


// Withdraw

function withdrawMoney() {

    alert("Withdrawal feature will be added in the next version.");

}


// Load Data

loadWallet();
loadHistory();


// Register Service Worker

if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register("/service-worker.js");

    });

}

</script>

</body>
</html>
