<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARVOZ | Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

width:90%;
max-width:400px;

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

.logo{

text-align:center;

font-size:35px;

font-weight:bold;

color:#ff6b00;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#666;

margin-bottom:25px;

}

label{

display:block;

margin-top:15px;

margin-bottom:8px;

font-weight:600;

}

input{

width:100%;

padding:14px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

}

button{

width:100%;

padding:15px;

margin-top:25px;

background:#ff6b00;

color:white;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#e65c00;

}

.error{

text-align:center;

margin-top:15px;

color:red;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

DARVOZ

</div>

<p class="subtitle">

Administrator Login

</p>

<label>Admin ID</label>

<input
type="text"
id="adminId"
placeholder="Enter Admin ID">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="loginAdmin()">

Login

</button>

<p id="error" class="error"></p>

</div>

<script>

function loginAdmin(){

const id=document.getElementById("adminId").value.trim();

const password=document.getElementById("password").value;

if(id==="admin" && password==="darvoz@123"){

localStorage.setItem("adminLoggedIn","true");

window.location.href="admin-dashboard.html";

}else{

document.getElementById("error").innerHTML="Invalid Admin ID or Password";

}

}

</script>

</body>
</html>
