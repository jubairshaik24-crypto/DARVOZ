<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>DARVOZ | Delivery Approval</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6b00;
color:white;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
font-size:28px;
}

header button{
background:white;
color:#ff6b00;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.container{
width:90%;
max-width:1200px;
margin:30px auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-bottom:20px;
}

.card h3{
margin-bottom:15px;
color:#ff6b00;
}

.row{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.status{
display:inline-block;
padding:6px 15px;
border-radius:20px;
color:white;
font-weight:bold;
margin-top:15px;
background:orange;
}

.actions{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.approve{
background:#28a745;
color:white;
}

.reject{
background:red;
color:white;
}

.delete{
background:#333;
color:white;
}

.empty{
background:white;
padding:80px;
text-align:center;
font-size:22px;
border-radius:15px;
color:#666;
}

</style>

</head>

<body>

<header>

<h2>🚴 Delivery Partner Approval</h2>

<button onclick="window.location.href='admin-dashboard.html'">

← Dashboard

</button>

</header>

<div class="container">

<div id="deliveryPartners">

<div class="empty">

Loading Delivery Partners...

</div>

</div>

</div>
<script>

async function loadDeliveryPartners(){

try{

const response = await fetch(
"http://localhost:5000/admin/delivery"
);

const partners = await response.json();

let html = "";

if(partners.length === 0){

html = `
<div class="empty">
No Delivery Partners Found
</div>
`;

}else{

partners.forEach(partner=>{

let statusColor = "orange";

if(partner.status==="Approved"){
statusColor="green";
}

if(partner.status==="Rejected"){
statusColor="red";
}

html += `

<div class="card">

<h3>${partner.name}</h3>

<div class="row">
<span><b>Mobile</b></span>
<span>${partner.mobile}</span>
</div>

<div class="row">
<span><b>Email</b></span>
<span>${partner.email}</span>
</div>

<div class="row">
<span><b>Vehicle</b></span>
<span>${partner.vehicle}</span>
</div>

<div class="row">
<span><b>Vehicle No</b></span>
<span>${partner.vehicle_number}</span>
</div>

<div class="row">
<span><b>City</b></span>
<span>${partner.city}</span>
</div>

<div class="row">
<span><b>Status</b></span>
<span class="status"
style="background:${statusColor}">
${partner.status}
</span>
</div>

<div class="actions">

<button
class="approve"
onclick="approve(${partner.id})">

✅ Approve

</button>

<button
class="reject"
onclick="rejectPartner(${partner.id})">

❌ Reject

</button>

<button
class="delete"
onclick="deletePartner(${partner.id})">

🗑 Delete

</button>

</div>

</div>

`;

});

}

document.getElementById("deliveryPartners").innerHTML = html;

}catch(err){

alert("Unable to load delivery partners.");

}

}


// Approve

async function approve(id){

const response = await fetch(

"http://localhost:5000/admin/delivery/approve/" + id,

{

method:"PUT"

}

);

const result = await response.json();

if(result.success){

alert("Delivery Partner Approved");

loadDeliveryPartners();

}

}


// Reject

async function rejectPartner(id){

const response = await fetch(

"http://localhost:5000/admin/delivery/reject/" + id,

{

method:"PUT"

}

);

const result = await response.json();

if(result.success){

alert("Delivery Partner Rejected");

loadDeliveryPartners();

}

}


// Delete

async function deletePartner(id){

if(!confirm("Delete this delivery partner?"))
return;

const response = await fetch(

"http://localhost:5000/admin/delivery/" + id,

{

method:"DELETE"

}

);

const result = await response.json();

if(result.success){

alert("Deleted Successfully");

loadDeliveryPartners();

}

}

loadDeliveryPartners();
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("/service-worker.js")
      .then((registration) => {
        console.log("Service Worker Registered", registration);
      })
      .catch((error) => {
        console.log("Registration Failed", error);
      });
  });
}

</script>

</body>
</html>
