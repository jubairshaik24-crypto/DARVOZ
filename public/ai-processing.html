<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DARVOZ AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f7f7f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

width:90%;
max-width:650px;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.1);

text-align:center;

}

h1{

color:#ff6b00;

margin-bottom:20px;

}

img{

width:120px;

margin:20px 0;

}

.progress{

width:100%;

height:20px;

background:#ddd;

border-radius:20px;

overflow:hidden;

margin-top:30px;

}

.bar{

width:0%;

height:100%;

background:#ff6b00;

transition:.4s;

}

#status{

margin-top:25px;

font-size:18px;

font-weight:600;

color:#444;

}

</style>

</head>

<body>

<div class="card">

<h1>🤖 DARVOZ AI</h1>

<p>

Please wait...

<br>

We are building your digital store.

</p>

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

<div class="progress">

<div
class="bar"
id="bar">
</div>

</div>

<p id="status">

Uploading Menu...

</p>

</div>

<script>

let width=0;

let messages=[

"Uploading Menu...",

"Reading Menu...",

"Extracting Products...",

"Creating Categories...",

"Building Product Cards...",

"Optimizing Store...",

"Almost Done..."

];

let index=0;

let interval=setInterval(()=>{

width+=2;

document.getElementById("bar").style.width=width+"%";

if(width%15==0 && index<messages.length){

document.getElementById("status").innerHTML=messages[index];

index++;

}

if(width>=100){

clearInterval(interval);

window.location.href="review-products.html";

}

},150);
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("/service-worker.js")
      .then((registration) => {
        console.log("Service Worker Registered", registration);
      })
      .catch((error) => {
        console.log("Registration Failed", error);
      });
  });
}

</script>

</body>
</html>
