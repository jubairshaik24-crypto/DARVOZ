<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DARVOZ | Partner Products</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6b00;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:95%;
max-width:1200px;
margin:25px auto;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.searchBox{
flex:1;
min-width:250px;
}

.searchBox input{
width:100%;
padding:12px 15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

.addBtn{
background:#ff6b00;
color:white;
padding:12px 20px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
font-weight:600;
}

.addBtn:hover{
background:#e65a00;
}

.tabs{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.tab{
padding:12px 25px;
background:white;
border-radius:30px;
cursor:pointer;
font-weight:600;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.tab.active{
background:#ff6b00;
color:white;
}

.productsGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.cardBody{
padding:15px;
}

.productName{
font-size:20px;
font-weight:600;
margin-bottom:8px;
}

.price{
font-size:18px;
font-weight:bold;
color:#ff6b00;
}

.badges{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.badge{
padding:5px 10px;
border-radius:20px;
font-size:13px;
color:white;
}

.available{
background:#28a745;
}

.out{
background:#dc3545;
}

.best{
background:#ffc107;
color:#000;
}

.actions{
display:flex;
justify-content:space-between;
margin-top:18px;
}

.editBtn,
.deleteBtn{

width:48%;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;

}

.editBtn{
background:#007bff;
color:white;
}

.deleteBtn{
background:#dc3545;
color:white;
}

.empty{
text-align:center;
padding:50px;
color:#888;
font-size:18px;
}

@media(max-width:768px){

.topBar{
flex-direction:column;
}

.addBtn{
width:100%;
}

}

</style>

</head>

<body>

<header>

DARVOZ Partner Products

</header>

<div class="container">

<div class="topBar">

<div class="searchBox">

<input
type="text"
id="search"
placeholder="🔍 Search Products">

</div>

<button
class="addBtn"
onclick="location.href='partner-add-product.html'">

➕ Add Product

</button>

</div>

<div class="tabs">

<div class="tab active" data-type="Food">
🍔 Food
</div>

<div class="tab" data-type="Groceries">
🛒 Groceries
</div>

<div class="tab" data-type="Meat">
🥩 Meat
</div>

</div>

<div
class="productsGrid"
id="productsGrid">

<div class="empty">

Loading Products...

</div>

</div>

</div>

<script>

// Current Business Type

let currentType="Food";

// Change Tabs

document.querySelectorAll(".tab").forEach(tab=>{

tab.onclick=function(){

document.querySelectorAll(".tab").forEach(t=>{

t.classList.remove("active");

});

this.classList.add("active");

currentType=this.dataset.type;

// Part 2

loadProducts();

}

});

// Part 2
async function loadProducts(){

const partner = JSON.parse(localStorage.getItem("partner"));

if(!partner){

location.href="partner-login.html";
return;

}

try{

const response = await fetch(

`http://localhost:5000/products/partner/${partner.id}/${currentType}`

);

const data = await response.json();

if(!data.success){

document.getElementById("productsGrid").innerHTML=

`<div class="empty">

No Products Found

</div>`;

return;

}

renderProducts(data.products);

}catch(err){

console.log(err);

document.getElementById("productsGrid").innerHTML=

`<div class="empty">

Server Error

</div>`;

}

}

function renderProducts(products){

const grid=document.getElementById("productsGrid");

if(products.length===0){

grid.innerHTML=`
<div class="empty">

No Products Available

</div>
`;

return;

}

grid.innerHTML="";

products.forEach(product=>{

const image=product.image
?product.image
:"images/default/other.jpg";

grid.innerHTML+=`

<div class="card">

<img src="${image}">

<div class="cardBody">

<div class="productName">

${product.product_name}

</div>

<div class="price">

₹${product.price}

</div>

<div class="badges">

<span class="badge ${product.available==1?"available":"out"}">

${product.available==1?"Available":"Out Of Stock"}

</span>

${product.bestseller==1?

`<span class="badge best">

⭐ Bestseller

</span>`:""}

</div>

<div class="actions">

<button
class="editBtn"
onclick="editProduct(${product.id})">

✏ Edit

</button>

<button
class="deleteBtn"
onclick="deleteProduct(${product.id})">

🗑 Delete

</button>

</div>

<div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;">

<button
onclick="toggleStatus(${product.id})">

${product.available==1 ? "🟢 Available" : "🔴 Out Of Stock"}

</button>

<button
onclick="toggleBestseller(${product.id})">

${product.bestseller==1 ? "⭐ Bestseller" : "☆ Make Bestseller"}

</button>

</div>

</div>

</div>

`;

});

}

</script>

</body>

</html>
