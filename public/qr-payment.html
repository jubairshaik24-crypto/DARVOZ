<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<title>DARVOZ | QR Payment</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
width:90%;
max-width:450px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
color:#ff6b00;
margin-bottom:20px;
}

.qr{
width:250px;
height:250px;
border:1px solid #ddd;
padding:10px;
margin:20px auto;
display:block;
}

.amount{
font-size:24px;
font-weight:bold;
color:green;
margin:15px 0;
}

.upi{
background:#f5f5f5;
padding:12px;
border-radius:10px;
margin:15px 0;
}

.timer{
font-size:26px;
font-weight:bold;
color:red;
margin:20px 0;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
background:#ff6b00;
color:white;
}

button:hover{
background:#e65a00;
}

#newQR{
display:none;
background:green;
}

</style>

</head>

<body>

<div class="card">

<h2>Scan & Pay</h2>

<img id="qrImage" class="qr" width="250" height="250">

<div class="amount">
Amount : ₹<span id="amount"></span>
</div>

<div class="amount">

 <span id="amount"></span>

</div>

<div class="upi">

UPI ID

<br><br>

<b>8333995837@ptsbi</b>

</div>

<div class="timer">

Time Left

<br>

<span id="time">05:00</span>

</div>

<button id="paidBtn">

Payment Completed

</button>

<button id="newQR">

Generate New QR

</button>
<script>

// Get total amount from checkout
let amount = localStorage.getItem("totalAmount") || "0";

// Show amount on page
document.getElementById("amount").innerHTML = amount;

// Your UPI ID
let upiId = "8333995837@ptsbi";

// Merchant Name
let merchant = "DARVOZ";

// Generate UPI Payment Link
let upiLink =
`upi://pay?pa=${upiId}&pn=${merchant}&am=${amount}&cu=INR`;

// Generate Dynamic QR Code
document.getElementById("qrImage").src =
`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;


// Payment Completed
document.getElementById("paidBtn").onclick=function(){

localStorage.removeItem("cart");

window.location.href="order-sucess.html";

};


// 3 Minute Timer

let seconds=300;

let timer=setInterval(function(){

let min=Math.floor(seconds/60);

let sec=seconds%60;

if(sec<10){

sec="0"+sec;

}

document.getElementById("time").innerHTML=min+":"+sec;

seconds--;

if(seconds<0){

clearInterval(timer);

document.getElementById("time").innerHTML="QR Code Expired";

document.getElementById("paidBtn").style.display="none";

document.getElementById("newQR").style.display="block";

}

},1000);


// Generate New QR

document.getElementById("newQR").onclick=function(){

location.reload();

};
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("/service-worker.js")
      .then((registration) => {
        console.log("Service Worker Registered", registration);
      })
      .catch((error) => {
        console.log("Registration Failed", error);
      });
  });
}
</script>

</div>

</body>
</html>
