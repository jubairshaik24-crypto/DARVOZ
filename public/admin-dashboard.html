<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DARVOZ Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#f4f4f4;

display:flex;

height:100vh;

overflow:hidden;

}

/* Sidebar */

.sidebar{

width:250px;

background:#ff6b00;

color:white;

display:flex;

flex-direction:column;

}
.partnerCard{

background:white;

padding:20px;

border-radius:15px;

margin-bottom:15px;

box-shadow:0 4px 15px rgba(0,0,0,.08);

}

.approveBtn{

background:green;

color:white;

border:none;

padding:10px 20px;

border-radius:8px;

cursor:pointer;

}

.rejectBtn{

background:red;

color:white;

border:none;

padding:10px 20px;

border-radius:8px;

cursor:pointer;

margin-left:10px;

}
.logo{

padding:25px;

font-size:28px;

font-weight:bold;

text-align:center;

border-bottom:1px solid rgba(255,255,255,.3);

}

.menu{

flex:1;

}

.menu button{

width:100%;

padding:18px;

border:none;

background:none;

color:white;

font-size:16px;

cursor:pointer;

text-align:left;

padding-left:25px;

transition:.3s;

}

.menu button:hover{

background:rgba(255,255,255,.15);

}

.logout{

padding:20px;

}

.logout button{

width:100%;

padding:15px;

background:red;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

/* Main */

.main{

flex:1;

overflow:auto;

padding:25px;

}

.topbar{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 3px 10px rgba(0,0,0,.08);

margin-bottom:20px;

}

.topbar h2{

color:#ff6b00;

}

.content{

background:white;

padding:25px;

border-radius:12px;

box-shadow:0 3px 10px rgba(0,0,0,.08);

min-height:600px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:20px;

margin-top:20px;

}

.card{

background:#fff3eb;

padding:25px;

border-radius:12px;

text-align:center;

}

.card h1{

font-size:40px;

color:#ff6b00;

}

.card p{

margin-top:10px;

font-weight:bold;

}
.dark{

background:#1f1f1f;

color:white;

}

.dark .topbar,
.dark .content,
.dark .card,
.dark .partnerCard{

background:#2d2d2d;

color:white;

}

.dark input{

background:#444;

color:white;

border:1px solid #666;

}
.partnerCard{

background:white;

padding:20px;

border-radius:12px;

margin-bottom:15px;

box-shadow:0 4px 12px rgba(0,0,0,.08);

}

.active{

background:rgba(255,255,255,.2)!important;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

DARVOZ

</div>

<div class="menu">

<button class="active" onclick="showDashboard()">

🏠 Dashboard

</button>
<button onclick="showPartners('Food')">🍔 Food Partners</button>

<button onclick="showPartners('Groceries')">🛒 Grocery Partners</button>

<button onclick="showPartners('Meat')">🥩 Meat Partners</button>

<button onclick="showPartners('delivery')">

🚴 Delivery

</button>

<button onclick="showPartners('oders')"> 📦 Orders</button>




<button onclick="showPartners('Customers')">👥 Customers </button>

<button onclick="showPartners('Wallet')">

💰 Wallet

</button>

<button onclick="showPartners('Settings')">

⚙ Settings

</button>

</div>

<div class="logout">

<button onclick="logout()">

Logout

</button>

</div>

</div>

<div class="main">

<div class="topbar">

<h2>

Welcome Admin 👋

</h2>

<p>

Manage DARVOZ from one place.

</p>

</div>

<div

class="content"

id="content">

<h2>

Dashboard

</h2>

<div class="cards">

<div class="card">

<h1 id="orders">

0

</h1>

<p>

Orders

</p>

</div>

<div class="card">

<h1 id="partners">

0

</h1>

<p>

Partners

</p>

</div>

<div class="card">

<h1 id="customers">

0

</h1>

<p>

Customers

</p>

</div>

<div class="card">

<h1 id="deliveryPartners">

0

</h1>

<p>

Delivery Partners

</p>

</div>

</div>

</div>

</div>

<script>

function showDashboard(){

document.getElementById("content").innerHTML=`

<h2>Dashboard</h2>

<div class="cards">

<div class="card">

<h1 id="orders">0</h1>

<p>Orders</p>

</div>

<div class="card">

<h1 id="partners">0</h1>

<p>Partners</p>

</div>

<div class="card">

<h1 id="customers">0</h1>

<p>Customers</p>

</div>

<div class="card">

<h1 id="deliveryPartners">0</h1>

<p>Delivery Partners</p>

</div>

</div>

`;

}

// 
async function showFood(){

const response=await fetch(

"http://localhost:5000/admin/food-partners"

);

const partners=await response.json();

let html=`

<h2>

🍔 Food Partner Approvals

</h2>

<br>

`;

partners.forEach(partner=>{

html+=`

<div style="

background:white;

padding:20px;

margin-bottom:15px;

border-radius:10px;

box-shadow:0 3px 10px rgba(0,0,0,.1);

">

<h3>

${partner.restaurant_name}

</h3>

<p>

Owner :
${partner.owner_name}

</p>

<p>

Mobile :
${partner.mobile}

</p>

<p>

Email :
${partner.email}

</p>

<br>

<button

onclick="approvePartner(${partner.id})"

style="

background:green;

color:white;

padding:10px 20px;

border:none;

border-radius:6px;

cursor:pointer;

">

Approve

</button>

<button

onclick="rejectPartner(${partner.id})"

style="

background:red;

color:white;

padding:10px 20px;

border:none;

border-radius:6px;

cursor:pointer;

margin-left:10px;

">

Reject

</button>

</div>

`;

});

document.getElementById("content").innerHTML=html;

}
// 
async function approvePartner(id){

await fetch(
"http://localhost:5000/admin/approve-partner/"+id,
{
method:"PUT"
});

    const data = await response.json();

    alert(data.success ? "Partner Approved Successfully" : "Approval Failed");

    showPartners("Food");

}


async function rejectPartner(id){

await fetch(
"http://localhost:5000/admin/reject-partner/"+id,
{
method:"DELETE"
});

showFood();

}
async function showPartners(type){

const response=await fetch(

"http://localhost:5000/admin/partners/"+type

);

const partners=await response.json();

let html=`

<h2>

${type} Partner Approvals

</h2>

<br>

`;

if(partners.length==0){

html+=`

<h3 style="text-align:center;color:gray;">

No Pending ${type} Partners

</h3>

`;

}

partners.forEach(partner=>{

html+=`

<div class="partnerCard">

<div style="display:flex;justify-content:space-between;">

<div>

<h3>

${partner.restaurant_name}

</h3>

<p>

Owner :
${partner.owner_name}

</p>

<p>

Mobile :
${partner.mobile}

</p>

<p>

Email :
${partner.email}

</p>

</div>

<div>

<img

src="http://localhost:5000/uploads/partners/${partner.image}"

style="

width:80px;

height:80px;

border-radius:10px;

object-fit:cover;

">

</div>

</div>

<br>

<button
class="approveBtn"
onclick="approvePartner(${partner.id})">

Approve

</button>

<button
class="rejectBtn"
onclick="rejectPartner(${partner.id})">

Reject

</button>

</div>

`;

});

document.getElementById("content").innerHTML=html;

}

async function showDelivery(){

const response = await fetch(
"http://localhost:5000/admin/delivery-partners"
);

const partners = await response.json();

let html = `
<h2>🚴 Delivery Partner Approvals</h2>
<br>
`;

if(partners.length===0){

html += `
<h3 style="text-align:center;color:gray;">
No Pending Delivery Partners
</h3>
`;

}else{

partners.forEach(partner=>{

html += `

<div class="partnerCard">

<h3>${partner.name}</h3>

<p>📱 ${partner.mobile}</p>

<p>📧 ${partner.email}</p>

<p>🚗 ${partner.vehicle_type}</p>

<br>

<button class="approveBtn"
onclick="approveDelivery(${partner.id})">

Approve

</button>

<button class="rejectBtn"
onclick="rejectDelivery(${partner.id})">

Reject

</button>

</div>

`;

});

}

document.getElementById("content").innerHTML = html;

}

async function approveDelivery(id){

await fetch(
"http://localhost:5000/admin/delivery/approve/"+id,
{
method:"PUT"
});

showDelivery();

}

async function rejectDelivery(id){

await fetch(
"http://localhost:5000/admin/delivery/reject/"+id,
{
method:"DELETE"
});

showDelivery();

}

async function showOrders(){

const response = await fetch(

"http://localhost:5000/admin/orders"

);

const orders = await response.json();

let html = `

<h2>📦 Orders</h2>

<br>

`;

if(orders.length==0){

html += `

<h3 style="text-align:center;color:gray;">

No Orders Found

</h3>

`;

}

orders.forEach(order=>{

html += `

<div class="partnerCard">

<h3>

Order #${order.id}

</h3>

<p>

👤 ${order.customer_name}

</p>

<p>

🏪 ${order.restaurant_name}

</p>

<p>

💰 ₹${order.grand_total}

</p>

<p>

Status :
<b style="color:#ff6b00;">

${order.status}

</b>

</p>

</div>

`;

});

document.getElementById("content").innerHTML = html;

}
async function showCustomers(){

const response = await fetch("http://localhost:5000/admin/customers");

const customers = await response.json();

let html = `<h2>👥 Customers</h2><br>`;

if(customers.length==0){

html += "<h3>No Customers Found</h3>";

}else{

customers.forEach(customer=>{

html += `

<div class="partnerCard">

<h3>${customer.name}</h3>

<p>📱 ${customer.mobile}</p>

<p>📧 ${customer.email}</p>

</div>

`;

});

}

document.getElementById("content").innerHTML = html;

}

async function showWallet(){

const response = await fetch("http://localhost:5000/admin/wallet");

const wallet = await response.json();

document.getElementById("content").innerHTML = `

<h2>💰 Wallet</h2>

<br>

<div class="cards">

<div class="card">

<h1>${wallet.partners}</h1>

<p>Approved Partners</p>

</div>

<div class="card">

<h1>₹${wallet.totalSettlement}</h1>

<p>Total Settlement</p>

</div>

<div class="card">

<h1>₹${wallet.pendingSettlement}</h1>

<p>Pending Settlement</p>

</div>

</div>

`;

}

async function showSettings(){

document.getElementById("content").innerHTML=`

<h2>⚙ Settings</h2>

<br>

<div class="partnerCard">

<h3>👤 Admin Profile</h3>

<p>Name : DARVOZ Administrator</p>

<p>Email : admin@darvoz.store</p>

</div>

<br>

<div class="partnerCard">

<h3>🔐 Change Password</h3>

<input
type="password"
id="oldPassword"
placeholder="Current Password"
style="width:100%;padding:12px;margin-top:10px;">

<input
type="password"
id="newPassword"
placeholder="New Password"
style="width:100%;padding:12px;margin-top:10px;">

<button
onclick="changePassword()"
style="margin-top:15px;
background:#ff6b00;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;">

Update Password

</button>

</div>

<br>

<div class="partnerCard">

<h3>🌙 Theme</h3>

<button
onclick="toggleTheme()"
style="margin-top:15px;
background:#333;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;">

Toggle Dark Mode

</button>

</div>

`;

}

function changePassword(){

const oldPassword=document.getElementById("oldPassword").value;

const newPassword=document.getElementById("newPassword").value;

if(oldPassword==="" || newPassword===""){

alert("Please fill all fields");

return;

}

alert("Password Updated Successfully (Backend will be connected later)");

}

function toggleTheme(){

document.body.classList.toggle("dark");

}

function logout(){

if(confirm("Logout from DARVOZ Admin?")){

localStorage.removeItem("adminLoggedIn");

window.location.href="admin-login.html";

}

}

</script>

</body>

</html>
