<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>DARVOZ Restaurants</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:15px;
border:1px solid #ddd;
text-align:center;
}

button{
padding:8px 15px;
background:green;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Restaurant Requests</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Restaurant</th>
<th>Owner</th>
<th>Mobile</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="data">

</tbody>

</table>

<script>

loadRestaurants();

function loadRestaurants() {

    fetch("http://localhost:5000/admin/restaurants")

    .then(res => res.json())

    .then(result => {

        let html = "";

        result.forEach(r => {

            html += `
            <tr>
                <td>${r.id}</td>
                <td>${r.restaurant_name}</td>
                <td>${r.owner_name}</td>
                <td>${r.mobile}</td>
                <td>${r.status}</td>
                <td>
                    ${
                        r.status === "Pending"
                        ? `<button onclick="approve(${r.id})">Approve</button>`
                        : `<span style="color:green;font-weight:bold;">Approved</span>`
                    }
                </td>
            </tr>
            `;

        });

        document.getElementById("data").innerHTML = html;

    })

    .catch(err => {
        console.log(err);
        alert("Unable to load restaurants.");
    });

}


function approve(id) {

    if (!confirm("Approve this restaurant?")) return;

    fetch("http://localhost:5000/admin/approve/" + id, {

        method: "PUT"

    })

    .then(res => res.json())

    .then(data => {

        if (data.success) {

            alert(
                "✅ Restaurant Approved!\n\n" +
                "Restaurant ID : " + data.restaurantId +
                "\nPassword : " + data.password
            );

            loadRestaurants();

        } else {

            alert("Approval Failed");

        }

    })

    .catch(err => {

        console.log(err);
        alert("Server Error");

    });

}
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("/service-worker.js")
      .then((registration) => {
        console.log("Service Worker Registered", registration);
      })
      .catch((error) => {
        console.log("Registration Failed", error);
      });
  });
}

</script>

</body>
</html>
