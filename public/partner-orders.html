<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>DARVOZ | Partner Orders</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{

background:#ff6b00;
color:white;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;

}

header h2{

font-size:28px;

}

header button{

background:white;
color:#ff6b00;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}

.container{

width:90%;
max-width:1000px;
margin:30px auto;

}

.card{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:25px;

}

.card h3{

margin-bottom:12px;

}

.row{

display:flex;
justify-content:space-between;
margin-bottom:10px;

}

.status{

display:inline-block;
padding:6px 15px;
background:orange;
color:white;
border-radius:20px;
font-size:14px;
margin-top:10px;

}

.actions{

display:flex;
gap:12px;
margin-top:20px;
flex-wrap:wrap;

}

.actions button{

padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
font-weight:600;

}

.accept{

background:#28a745;
color:white;

}

.reject{

background:red;
color:white;

}

.prepare{

background:#007bff;
color:white;

}

.ready{

background:#ff6b00;
color:white;

}

.empty{

background:white;
padding:70px;
text-align:center;
font-size:22px;
border-radius:15px;
color:#777;

}

</style>

</head>

<body>

<header>

<h2>🍽 Partner Orders</h2>

<button onclick="window.location.href='partner-dashboard.html'">

← Dashboard

</button>

</header>

<div class="container">

<div id="orders">

<div class="empty">

Loading Orders...

</div>

</div>

</div>
<script>

const partnerId = 1;

// Load Orders

async function loadOrders(){

try{

const response = await fetch(
"http://localhost:5000/partner-orders/" + partnerId
);

const orders = await response.json();

let html = "";

if(orders.length === 0){

html = `
<div class="empty">
No Orders Available
</div>
`;

}else{

orders.forEach(order=>{

html += `

<div class="card">

<h3>Order #${order.id}</h3>

<div class="row">
<span><b>Customer</b></span>
<span>${order.customer_name}</span>
</div>

<div class="row">
<span><b>Mobile</b></span>
<span>${order.mobile}</span>
</div>

<div class="row">
<span><b>Restaurant</b></span>
<span>${order.restaurant_name}</span>
</div>

<div class="row">
<span><b>Address</b></span>
<span>${order.address}</span>
</div>

<div class="row">
<span><b>Total</b></span>
<span>₹${order.grand_total}</span>
</div>

<div class="status">

${order.status}

</div>

<div class="actions">

<button
class="accept"
onclick="updateStatus(${order.id},'Accepted')">

✅ Accept

</button>

<button
class="reject"
onclick="updateStatus(${order.id},'Rejected')">

❌ Reject

</button>

<button
class="prepare"
onclick="updateStatus(${order.id},'Preparing')">

🍳 Preparing

</button>

<button
class="ready"
onclick="updateStatus(${order.id},'Ready')">

📦 Ready

</button>

</div>

</div>

`;

});

}

document.getElementById("orders").innerHTML = html;

}catch(err){

alert("Unable to load orders.");

}

}

// Update Status

async function updateStatus(id,status){

alert(
"Next Part: Update order #" +
id +
" to " +
status
);

}

loadOrders();
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("/service-worker.js")
      .then((registration) => {
        console.log("Service Worker Registered", registration);
      })
      .catch((error) => {
        console.log("Registration Failed", error);
      });
  });
}
</script>

</body>

</html>
