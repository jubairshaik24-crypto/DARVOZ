<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>DARVOZ | Delivery Partner</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6b00;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin:30px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:20px;
color:#ff6b00;
}

.info{
margin:15px 0;
font-size:17px;
}

.info span{
font-weight:bold;
}

.status{
text-align:center;
margin:20px 0;
padding:12px;
background:#fff4eb;
border-radius:10px;
font-size:18px;
font-weight:bold;
color:#ff6b00;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
color:white;
}

.accept{
background:#28a745;
}

.pickup{
background:#007bff;
display:none;
}

.deliver{
background:#ff6b00;
display:none;
}

.home{
background:#333;
display:none;
}

</style>

</head>

<body>

<header>

<h1>🚴 DARVOZ Delivery Partner</h1>

</header>

<div class="container">

<h2>Delivery Order</h2>

<div class="info">
<span>Order ID :</span>
<span id="orderId"></span>
</div>

<div class="info">
<span>Restaurant :</span>
Paradise Biryani
</div>

<div class="info">
<span>Customer :</span>
Jubair
</div>

<div class="info">
<span>Phone :</span>
8333995837
</div>

<div class="info">
<span>Address :</span>
Sankavaram, Kanigiri, Andhra Pradesh
</div>

<div class="info">
<span>Amount :</span>
₹<span id="amount"></span>
</div>

<div class="status" id="status">

Waiting to Accept Order

</div>

<button class="accept" id="acceptBtn" onclick="acceptOrder()">

Accept Delivery

</button>

<button class="pickup" id="pickupBtn" onclick="pickupOrder()">

Picked Up

</button>

<button class="deliver" id="deliverBtn" onclick="deliverOrder()">

Delivered

</button>

<button class="home" id="homeBtn" onclick="window.location.href='index.html'">

Back to Home

</button>

</div>

<script>

// Random Order ID

let orderId="DV"+Math.floor(100000+Math.random()*900000);

document.getElementById("orderId").innerHTML=orderId;


// Amount from Checkout

let amount=localStorage.getItem("totalAmount") || "0";

document.getElementById("amount").innerHTML=amount;


// Accept Order

function acceptOrder(){

document.getElementById("status").innerHTML="✅ Order Accepted";

document.getElementById("acceptBtn").style.display="none";

document.getElementById("pickupBtn").style.display="block";

}


// Picked Up

function pickupOrder(){

document.getElementById("status").innerHTML="🚴 Out for Delivery";

document.getElementById("pickupBtn").style.display="none";

document.getElementById("deliverBtn").style.display="block";

}


// Delivered

function deliverOrder(){

document.getElementById("status").innerHTML="🎉 Order Delivered Successfully";

document.getElementById("deliverBtn").style.display="none";

document.getElementById("homeBtn").style.display="block";

}
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("/service-worker.js")
      .then((registration) => {
        console.log("Service Worker Registered", registration);
      })
      .catch((error) => {
        console.log("Registration Failed", error);
      });
  });
}

</script>

</body>
</html>
