<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>DARVOZ | My Products</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6b00;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
font-size:28px;
}

header button{
background:white;
color:#ff6b00;
border:none;
padding:10px 18px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.container{
width:90%;
max-width:1200px;
margin:30px auto;
}

.top-buttons{
display:flex;
gap:15px;
margin-bottom:25px;
flex-wrap:wrap;
}

.top-buttons button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:600;
}

.add{
background:#28a745;
color:white;
}

.upload{
background:#ff6b00;
color:white;
}

.refresh{
background:#007bff;
color:white;
}

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;

}

.card{

background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.1);

}

.card img{

width:100%;
height:220px;
object-fit:cover;

}

.details{

padding:18px;

}

.details h3{

margin-bottom:10px;

}

.description{

color:#666;
margin-bottom:12px;

}

.price{

font-size:22px;
font-weight:bold;
color:#ff6b00;
margin-bottom:15px;

}

.actions{

display:flex;
justify-content:space-between;

}

.edit{

background:#ffc107;
color:black;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;

}

.delete{

background:red;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;

}

.empty{

text-align:center;
font-size:22px;
padding:80px;
color:#777;

}

</style>

</head>

<body>

<header>

<h2>📦 My Products</h2>

<button onclick="window.location.href='partner-dashboard.html'">

← Dashboard

</button>

</header>

<div class="container">

<div class="top-buttons">

<button class="add"
onclick="window.location.href='add-product.html'">

➕ Add Product

</button>

<button class="upload"
onclick="window.location.href='upload-menu.html'">

🤖 Upload Menu

</button>

<button class="refresh"
onclick="loadProducts()">

🔄 Refresh

</button>

</div>

<div id="products" class="grid">

<!-- Products will load here -->

</div>

</div>
