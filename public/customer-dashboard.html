<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DARVOZ | Customer Dashboard</title>

<link rel="manifest" href="/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:90px;
}

header{

background:#ff6b00;
color:white;
padding:18px;

}

header h2{

font-size:24px;

}

header p{

margin-top:5px;
font-size:14px;

}

.container{

width:92%;
max-width:900px;
margin:20px auto;

}

.searchBox{

background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.searchBox input{

width:100%;
padding:14px;
border:none;
outline:none;
font-size:16px;

}

.category{

display:flex;
justify-content:space-around;

background:white;

margin-top:18px;

border-radius:10px;

box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.category div{

padding:15px;

font-weight:bold;

cursor:pointer;

flex:1;

text-align:center;

}

.category .active{

color:#ff6b00;

border-bottom:3px solid #ff6b00;

}

.address{

background:white;

padding:18px;

margin-top:18px;

border-radius:10px;

box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.address h4{

margin-bottom:10px;

}

.storeTitle{

margin-top:25px;

margin-bottom:10px;

color:#444;

}

.storeList{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(250px,1fr));

gap:15px;

}

.storeCard{

background:white;

border-radius:12px;

padding:15px;

box-shadow:0 3px 10px rgba(0,0,0,.08);

cursor:pointer;

transition:.3s;

}

.storeCard:hover{

transform:translateY(-3px);

}

.storeImage{

width:100%;

height:140px;

background:#eee;

border-radius:10px;

margin-bottom:10px;

display:flex;

align-items:center;

justify-content:center;

font-size:45px;

}

.storeCard h3{

margin-bottom:6px;

}

.storeCard p{

color:#666;

font-size:14px;

margin-bottom:5px;

}

.bottomNav{

position:fixed;

bottom:0;

left:0;

right:0;

background:white;

display:flex;

justify-content:space-around;

padding:12px 0;

box-shadow:0 -3px 10px rgba(0,0,0,.1);

}

.bottomNav div{

text-align:center;

font-size:14px;

cursor:pointer;

}

.bottomNav .active{

color:#ff6b00;

font-weight:bold;

}

</style>

</head>

<body>

<header>

<h2>

Hello,

<span id="customerName">

Customer

</span>

👋

</h2>

<p>

One App. Every Need.

</p>

</header>

<div class="container">

<div class="searchBox">

<input
type="text"
placeholder="Search restaurants, groceries or meat...">

</div>

<div class="category">

<div class="active">

🍔 Food

</div>

<div>

🛒 Groceries

</div>

<div>

🥩 Meat

</div>

</div>

<div class="address">

<h4>

📍 Delivery Address

</h4>

<p id="customerAddress">

Loading Address...

</p>

</div>

<h3 class="storeTitle">

Nearby Stores

</h3>

<div class="storeList" id="storeList">

<div class="storeCard">

<div class="storeImage">

🍔

</div>

<h3>Loading...</h3>

<p>Please wait...</p>

</div>

</div>

</div>

<div class="bottomNav">

<div class="active">

🏠

<br>

Home

</div>

<div onclick="location.href='my-orders.html'">

📦

<br>

Orders

</div>

<div onclick="location.href='profile.html'">

👤

<br>

Profile

</div>

</div>

<script>

// -----------------------------
// Customer Details
// -----------------------------

const customer = JSON.parse(localStorage.getItem("customer"));

if(!customer){

    alert("Please login first.");

    window.location.href="customer-login.html";

}

document.getElementById("customerName").innerHTML =
customer.name;


// -----------------------------
// Delivery Address
// -----------------------------

const address = JSON.parse(localStorage.getItem("customerAddress"));

if(address){

document.getElementById("customerAddress").innerHTML =

address.address;

}else{

document.getElementById("customerAddress").innerHTML =

"No Address Selected";

}


// -----------------------------
// Category
// -----------------------------

let currentCategory="Food";

const tabs=document.querySelectorAll(".category div");

tabs.forEach(tab=>{

tab.onclick=function(){

tabs.forEach(t=>t.classList.remove("active"));

this.classList.add("active");

currentCategory=this.innerText.replace("🍔","")
.replace("🛒","")
.replace("🥩","")
.trim();

loadPartners();

}

});


// -----------------------------
// Load Partners
// -----------------------------

async function loadPartners(){

try{

const response=await fetch(

`http://localhost:5000/partner/category/${currentCategory}`

);

const partners=await response.json();

const storeList=document.getElementById("storeList");

storeList.innerHTML="";

if(partners.length==0){

storeList.innerHTML=`

<div class="storeCard">

<h3>No Stores Found</h3>

<p>Please check again later.</p>

</div>

`;

return;

}

partners.forEach(store=>{

storeList.innerHTML+=`

<div class="storeCard"

onclick="openStore(${store.id})">

<div class="storeImage">

<img
src="http://localhost:5000/uploads/partners/${store.image}"
style="width:100%;height:100%;object-fit:cover;border-radius:10px;">

</div>

<h3>

${store.restaurant_name}

</h3>

<p>

⭐ 4.5

&nbsp;&nbsp;

🕒 25-35 mins

</p>

<p>

📍 ${store.address}

</p>

</div>

`;

});

}catch(err){

console.log(err);

}

}


// -----------------------------
// Open Store
// -----------------------------

function openStore(id){

window.location.href=

`restaurant.html?id=${id}`;

}


// -----------------------------
// Load Default
// -----------------------------

loadPartners();

</script>

</body>
</html>
