<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>DARVOZ | Manage Restaurants</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6b00;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header a{
color:white;
text-decoration:none;
}

.container{
width:90%;
max-width:900px;
margin:30px auto;
}

.card{
background:white;
padding:25px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h2{
color:#ff6b00;
margin-bottom:15px;
}

.info{
margin:8px 0;
font-size:16px;
}

.status{
margin-top:15px;
padding:10px;
background:#fff4eb;
border-radius:8px;
font-weight:bold;
color:#ff6b00;
text-align:center;
}

.buttons{
display:flex;
gap:15px;
margin-top:20px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
color:white;
}

.approve{
background:#28a745;
}

.reject{
background:#dc3545;
}

.back{
background:#ff6b00;
margin-top:20px;
width:100%;
}

</style>

</head>

<body>

<header>

<h2>🍴 Manage Restaurants</h2>

<a href="admin-dashboard.html">← Dashboard</a>

</header>

<div class="container">

<div class="card">

<h2 id="restaurantName">Paradise Biryani</h2>

<div class="info">
<b>Owner :</b>
<span id="ownerName">Jubair</span>
</div>

<div class="info">
<b>Mobile :</b>
<span id="mobile">8333995837</span>
</div>

<div class="info">
<b>Restaurant ID :</b>
<span id="restaurantId"></span>
</div>

<div class="status" id="status">

Pending Approval

</div>

<div class="buttons">

<button class="approve" onclick="approveRestaurant()">

Approve

</button>

<button class="reject" onclick="rejectRestaurant()">

Reject

</button>

</div>

</div>

<button class="back"
onclick="window.location.href='admin-dashboard.html'">

Back to Dashboard

</button>

</div>

<script>

// Load Registered Partner Details

document.getElementById("restaurantName").innerHTML =
localStorage.getItem("restaurantName") || "No Restaurant";

document.getElementById("ownerName").innerHTML =
localStorage.getItem("ownerName") || "Owner";

document.getElementById("mobile").innerHTML =
localStorage.getItem("mobile") || "Not Available";

document.getElementById("restaurantId").innerHTML =
localStorage.getItem("restaurantId") || "REST000000";

function approveRestaurant(){

document.getElementById("status").innerHTML="✅ Approved";

document.getElementById("status").style.background="#d4edda";
document.getElementById("status").style.color="green";

alert("Restaurant Approved Successfully!");

}

function rejectRestaurant(){

document.getElementById("status").innerHTML="❌ Rejected";

document.getElementById("status").style.background="#f8d7da";
document.getElementById("status").style.color="red";

alert("Restaurant Rejected.");

}
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("/service-worker.js")
      .then((registration) => {
        console.log("Service Worker Registered", registration);
      })
      .catch((error) => {
        console.log("Registration Failed", error);
      });
  });
}

</script>

</body>
</html>
